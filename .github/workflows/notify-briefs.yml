# ADD THIS FILE TO THE DOCS REPO at: .github/workflows/notify-briefs.yml
# (repo: LongFi-Solutions/longfi-solutions.github.io)
#
# On every push that changes a deployment guide, its images, or mkdocs.yml, this
# pings longfi-briefs to regenerate the branded, gated versions.
#
# One-time setup: create a fine-grained PAT with access limited to
# LongFi-Solutions/longfi-briefs, permission "Contents: Read and write", and add
# it to THIS repo's secrets as  BRIEFS_DISPATCH_TOKEN.

name: Notify briefs

on:
  push:
    branches: [main]
    paths:
      - 'docs/deployment/**'
      - 'docs/assets/images/**'
      - 'mkdocs.yml'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger longfi-briefs rebuild
        env:
          TOKEN: ${{ secrets.BRIEFS_DISPATCH_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          code=$(curl --fail-with-body -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/LongFi-Solutions/longfi-briefs/dispatches \
            -d "{\"event_type\":\"docs-updated\",\"client_payload\":{\"sha\":\"${SHA}\"}}") || {
              echo "Dispatch failed (HTTP ${code}):"; cat /tmp/resp.json; exit 1;
            }
          echo "Dispatch accepted (HTTP ${code})."
