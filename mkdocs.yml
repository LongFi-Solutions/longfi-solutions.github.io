site_name: LongFi Solutions Documentation
site_url: https://longfi-solutions.github.io
site_description: Deployment guides, vendor configuration, and best practices for LongFi Passpoint and OpenRoaming infrastructure.

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

extra_css:
  - assets/stylesheets/brand.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview:
    - Introduction: overview/index.md
    # - Onboarding & Activation: overview/onboarding-activation.md
    # - Passpoint & Carrier Offload: overview/passpoint.md
    # - RadSec: overview/radsec.md
    # - OpenRoaming: overview/openroaming.md
  - Best Practices:
    - Best Practices & Considerations for Passpoint: best-practices/index.md
  - Deployment Guides:
    # - Introduction: deployment/index.md
    - UniFi: deployment/unifi.md
    - Omada: deployment/omada-networks.md
    # - Meraki: deployment/meraki.md
    # - Aruba: deployment/aruba.md
    # - Ruckus: deployment/ruckus.md
    # - Cambium: deployment/cambium.md
