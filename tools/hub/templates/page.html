<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PAGE_TITLE__</title>
<meta name="description" content="__DESC__">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/assets/images/LongFi-Icon-Only-PNG.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/hub/hub.css">
<script>
  window.LF_DOCS_EXPECTED = "__EXPECTED__";
  try { if (localStorage.getItem('lf-docs-gate') === window.LF_DOCS_EXPECTED) document.documentElement.classList.add('lf-unlocked'); } catch(e){}
</script>
</head>
<body>
  <!-- Password gate (courtesy, whole-site) -->
  <div id="lf-gate">
    <div class="lf-gate-card">
      <img src="/assets/images/LongFi-Icon-Only-PNG.png" alt="LongFi Solutions" onerror="this.style.display='none'"/>
      <h1>LongFi Documentation</h1>
      <p>Enter the password your LongFi contact gave you to view the documentation.</p>
      <form id="lf-gate-form" autocomplete="off">
        <input id="lf-gate-pw" type="password" placeholder="Password" autocomplete="off" aria-label="Password" required />
        <button type="submit">View documentation</button>
      </form>
      <div class="lf-gate-err" id="lf-gate-err"></div>
    </div>
  </div>

  <div class="site">
    <!-- Top nav -->
    <header class="topbar">
      <a class="brand" href="/"><img class="brand-mark" src="/assets/images/LongFi-Icon-Only-PNG.png" alt=""><span class="brand-name">LongFi Solutions</span></a>
      <nav class="topnav" aria-label="Sections">__TOPNAV__</nav>
      <div class="top-tools">
        <div class="search" role="search">
          <input id="search-input" type="search" placeholder="Search docs" aria-label="Search documentation" autocomplete="off">
          <div id="search-results" role="listbox" aria-label="Search results"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>
        </button>
      </div>
    </header>

    <!-- Hero -->
    <header class="hero">
      <div class="hero-inner">
        <div class="eyebrow">__EYEBROW__</div>
        <h1>__HERO_TITLE__</h1>
        <div class="hero-lead">__HERO_LEAD__</div>
      </div>
    </header>

    <div class="wrap layout">
      <main class="article">
__ARTICLE__
        <footer class="page-footer">
          LongFi Solutions &middot; LongFi Connect Documentation
        </footer>
      </main>
      <aside class="sidebar">
        __SIDENAV__
        <nav class="toc" aria-label="On this page">__TOC__</nav>
      </aside>
    </div>
  </div>

  <script src="/assets/hub/search.js" defer></script>
  <script src="/assets/hub/gate.js" defer></script>
  <script>
    (function(){
      var root=document.documentElement,btn=document.getElementById('themeToggle');
      function apply(m){root.setAttribute('data-theme',m);}
      var s=null; try{s=localStorage.getItem('lf-theme');}catch(e){}
      if(!s&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)s='dark';
      apply(s==='dark'?'dark':'light');
      btn.addEventListener('click',function(){var n=root.getAttribute('data-theme')==='dark'?'light':'dark';apply(n);try{localStorage.setItem('lf-theme',n);}catch(e){}});
    })();
    (function(){
      // in-page anchor scroll (consistent behavior + offset for sticky topbar)
      document.addEventListener('click',function(e){
        var a=e.target.closest?e.target.closest('a[href^="#"]'):null; if(!a)return;
        var id=a.getAttribute('href').slice(1); var el=id&&document.getElementById(id);
        if(el){e.preventDefault();var y=el.getBoundingClientRect().top+scrollY-80;scrollTo({top:y<0?0:y,behavior:'smooth'});history.replaceState(null,'','#'+id);}
      });
      // TOC scroll-spy
      var links=[].slice.call(document.querySelectorAll('.toc a'));
      var map={}; links.forEach(function(a){map[a.getAttribute('href').slice(1)]=a;});
      var secs=links.map(function(a){return document.getElementById(a.getAttribute('href').slice(1));}).filter(Boolean);
      function set(id){links.forEach(function(a){a.classList.toggle('active',a===map[id]);});}
      if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)set(e.target.id);});},{rootMargin:'-90px 0px -70% 0px'});secs.forEach(function(s){io.observe(s);});}
    })();
  </script>
</body>
</html>
